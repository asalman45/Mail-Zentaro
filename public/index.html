<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentaro Mail - Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon">Z</div>
                <h1>Zentaro Mail</h1>
                <p>Admin Panel</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="admin@zentaro.pk" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
                <p id="loginError" class="error-text"></p>
            </form>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="main-app" style="display:none">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon small">Z</div>
                <span class="logo-text">Zentaro Mail</span>
            </div>
            <button class="btn-compose" onclick="openCompose()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                <span>Compose</span>
            </button>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-folder="inbox" onclick="loadFolder('inbox',this)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-6l-2 3H10l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg>
                    <span>Inbox</span>
                    <span class="badge" id="unreadBadge" style="display:none">0</span>
                </a>
                <a href="#" class="nav-item" data-folder="sent" onclick="loadFolder('sent',this)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    <span>Sent</span>
                </a>
                <a href="#" class="nav-item" data-folder="starred" onclick="loadFolder('starred',this)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    <span>Starred</span>
                </a>
                <a href="#" class="nav-item" data-folder="archive" onclick="loadFolder('archive',this)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
                    <span>Archive</span>
                </a>
            </nav>
            <div class="sidebar-section">
                <h4>Accounts</h4>
                <div id="accountsList"></div>
                <button class="btn-add-account" onclick="openAccountModal()">+ Add Account</button>
            </div>
            <div class="sidebar-footer">
                <button class="btn-logout" onclick="logout()">Sign Out</button>
            </div>
        </aside>

        <main class="email-list-panel">
            <div class="list-header">
                <h2 id="folderTitle">Inbox</h2>
                <div class="search-bar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="searchInput" placeholder="Search emails..." oninput="debounceSearch()">
                </div>
            </div>
            <div id="emailList" class="email-list">
                <div class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M22 12h-6l-2 3H10l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg>
                    <p>No emails yet</p>
                </div>
            </div>
        </main>

        <section class="email-detail-panel" id="detailPanel">
            <div class="detail-placeholder">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>
                <p>Select an email to read</p>
            </div>
        </section>
    </div>

    <!-- Compose Modal -->
    <div id="composeModal" class="modal" style="display:none">
        <div class="modal-content compose-modal">
            <div class="modal-header">
                <h3>New Message</h3>
                <button class="btn-close" onclick="closeCompose()">&times;</button>
            </div>
            <form id="composeForm" onsubmit="sendEmail(event)">
                <div class="compose-field"><label>From</label><select id="composeFrom" required></select></div>
                <div class="compose-field"><label>To</label><input type="text" id="composeTo" placeholder="recipient@example.com" required></div>
                <div class="compose-field"><label>Subject</label><input type="text" id="composeSubject" placeholder="Subject"></div>
                <div class="compose-body"><textarea id="composeContent" placeholder="Write your message..." rows="12"></textarea></div>
                <div class="compose-actions">
                    <button type="submit" class="btn-primary" id="sendBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        Send
                    </button>
                    <button type="button" class="btn-secondary" onclick="closeCompose()">Discard</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Account Modal -->
    <div id="accountModal" class="modal" style="display:none">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="accountModalTitle">Add Email Account</h3>
                <button class="btn-close" onclick="closeAccountModal()">&times;</button>
            </div>
            <form id="accountForm" onsubmit="saveAccount(event)">
                <div class="form-group"><label>Email Address</label><input type="email" id="accEmail" placeholder="admin@zentaro.pk" required></div>
                <div class="form-group"><label>Display Name</label><input type="text" id="accName" placeholder="Zentaro Admin" required></div>
                <div class="form-group"><label>SMTP Host</label><input type="text" id="accSmtpHost" value="smtp-relay.brevo.com"></div>
                <div class="form-group"><label>SMTP Port</label><input type="number" id="accSmtpPort" value="587"></div>
                <div class="form-group"><label>SMTP Username</label><input type="text" id="accSmtpUser" placeholder="login@smtp-brevo.com"></div>
                <div class="form-group"><label>SMTP Password</label><input type="password" id="accSmtpPass" placeholder="SMTP password"></div>
                <div class="compose-actions">
                    <button type="submit" class="btn-primary">Save Account</button>
                    <button type="button" class="btn-secondary" onclick="closeAccountModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="app.js"></script>
</body>
</html>
